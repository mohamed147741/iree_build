name: PkgCI Build Android fixed

on:
  workflow_call:
    inputs:
      artifact_run_id:
        type: string
        default: ""
      write-caches:
        required: true
        type: string
  workflow_dispatch:
    inputs:
      artifact_run_id:
        type: string
        default: ""
      write-caches:
        required: true
        type: string

permissions:
  contents: read
  actions: write 

jobs:
  android_arm64:
    runs-on: ubuntu-24.04
    env:
      PACKAGE_DOWNLOAD_DIR: ${{ github.workspace }}/.packages
      VENV_DIR: ${{ github.workspace }}/.venv
      GH_TOKEN: ${{ github.token }}
      IREE_TARGET_BUILD_DIR: build-android-arm_64
      CC: clang
      CXX: clang++
    steps:
      - name: "Checking out repository"
        uses: actions/checkout@v4
        
      - name: "Checking out runtime submodules"
        run: ./build_tools/scripts/git/update_runtime_submodules.sh
        
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.14
        with:
          key: ${{ github.job }}
          save: ${{ inputs.write-caches == '1' }}
          
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        if: ${{ inputs.artifact_run_id != '' }}
        with:
          name: linux_x86_64_release_packages
          path: ${{ env.PACKAGE_DOWNLOAD_DIR }}
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download Local Artifacts
        uses: actions/download-artifact@v4
        if: ${{ inputs.artifact_run_id == '' }}
        with:
          name: linux_x86_64_release_packages
          path: ${{ env.PACKAGE_DOWNLOAD_DIR }}

      - name: Setup base venv
        run: |
          ./build_tools/pkgci/setup_venv.py ${VENV_DIR} \
            --artifact-path=${PACKAGE_DOWNLOAD_DIR} \
            --fetch-gh-workflow=${{ inputs.artifact_run_id }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Install build dependencies
        run: sudo apt update && sudo apt install -y ninja-build

      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b

      - name: Build for Android
        env:
          IREE_HOST_BIN_DIR: ${{ env.VENV_DIR }}/bin
          IREE_READ_REMOTE_CCACHE: 0
          IREE_WRITE_REMOTE_CCACHE: 0
          IREE_READ_LOCAL_CCACHE: 1
          IREE_WRITE_LOCAL_CCACHE: ${{ inputs.write-caches }}
        run: build_tools/cmake/build_android.sh

      - name: "Upload Android Arm64 Binaries"
        uses: actions/upload-artifact@v4
        with:
          name: iree-android-binaries
          # هنا قمنا بتغيير المسار ليشمل الملفات التنفيذية والمكتبات من داخل مجلد البناء مباشرة
          # نركز على مجلد tools (للأدوات التنفيذية) و الاختصارات للمكتبات
          path: |
            ${{ env.IREE_TARGET_BUILD_DIR }}/tools/
            ${{ env.IREE_TARGET_BUILD_DIR }}/**/*.so
            ${{ env.IREE_TARGET_BUILD_DIR }}/**/*.a
          retention-days: 7
